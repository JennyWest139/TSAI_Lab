{# Reporting-Status-Badge (complete | in_progress | incomplete) #}
{% macro reporting_badge(status, job_status='fertig') %}
  {% if status.code == 'complete' %}
    <span class="badge badge-ok">{{ job_status }}</span>
  {% elif status.code == 'na' %}
    <span class="badge badge-muted">{{ job_status }}</span>
  {% else %}
    <span class="badge {{ status.badge_class }}"{% if status.detail %} title="{{ status.detail }}"{% endif %}>{{ status.label }}</span>
  {% endif %}
{% endmacro %}
