# Pfade zu Ihren Quelldaten (anpassbar)
werte_csv: "C:/Users/jenni/OneDrive - Jennifer Westphal/Jennifer Westphal - MasterSchool/80_Abschlussarbeit/Material/DAX_Diplom/Werte.csv"
diplomarbeit_pdf: "C:/Users/jenni/OneDrive - Jennifer Westphal/Jennifer Westphal - MasterSchool/80_Abschlussarbeit/Peter_Westphal_Diplomarbeit Jennifer Westphal/Diplomarbeit Jennifer Westphal/Diplomarbeit als PDF/Diplomarbeit JW 2008.pdf"

csv:
  sep: ";"
  encoding: "utf-8-sig"
  date_column: "Datum1"      # Spalte B
  value_column: "PDAX"       # Spalte C
  date_format: "%d.%m.%Y"

output_dir: "output"

# Sichtfenster Prognosegrafiken (CLI: --plot-pre-years / --plot-forecast-years / --plot-post-years)
forecast_plot_window:
  pre_years: 3
  forecast_years: 1
  post_years: 1

# Standard-Cutoff für extended-Modus (letzter Monat mit vollständigem PDAX vor Lücken)
default_cutoff: "2007-06-30"

# Analysemodus (thesis | extended) wird in CLI/UI explizit gewählt – siehe analysis_mode.py
analysis_mode:
  thesis:
    start_date: "1987-12-01"
    end_date: "2007-07-01"
  extended:
    start_date: null
    end_date: null

# Datenbank (TSLAB_DATABASE_URL ueberschreibt alles)
database:
  # PostgreSQL (Web-Dashboard, Korrelation, TSA)
  url: "postgresql+psycopg2://tslab:tslab@localhost:5432/tslab"

# AI-Berichte (Phase 6)
ai_reports:
  enabled: false
  max_tokens: 1000
  default_model: "openai:gpt-4o-mini"
  output_basename: "CORR_AI_Bericht.docx"
  openai_api_key: null
  gemini_api_key: null
  langfuse_public_key: null
  langfuse_secret_key: null
  langfuse_host: "https://cloud.langfuse.com"
  models:
    - id: openai:gpt-4o-mini
      provider: openai
      label: "GPT-4o mini"
      model: gpt-4o-mini
      vision: true
      enabled: true
    - id: openai:gpt-5-mini
      provider: openai
      label: "GPT-5 mini"
      model: gpt-5-mini
      vision: true
      enabled: true
    - id: openai:gpt-5-nano
      provider: openai
      label: "GPT-5 nano"
      model: gpt-5-nano
      vision: true
      enabled: true
    - id: gemini:gemini-3.1-flash-lite
      provider: gemini
      label: "Gemini 3.1 Flash Lite"
      model: gemini-3.1-flash-lite
      vision: true
      enabled: true
    - id: gemini:gemini-2.5-flash-lite
      provider: gemini
      label: "Gemini 2.5 Flash Lite"
      model: gemini-2.5-flash-lite
      vision: true
      enabled: true
    - id: gemini:gemini-2.5-flash
      provider: gemini
      label: "Gemini 2.5 Flash"
      model: gemini-2.5-flash
      vision: true
      enabled: true
