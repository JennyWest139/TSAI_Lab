services:
  postgres:
    image: postgres:16-alpine
    container_name: tslab-postgres
    environment:
      POSTGRES_USER: tslab
      POSTGRES_PASSWORD: tslab
      POSTGRES_DB: tslab
    ports:
      - "5432:5432"
    volumes:
      - tslab_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tslab -d tslab"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tslab_pgdata:
